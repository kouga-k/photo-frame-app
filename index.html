<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#e07b8b">
  <title>フォトフレーム撮影</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="フォトフレーム">
</head>
<body>

  <!-- トップ画面 -->
  <div id="screen-top" class="screen active">
    <div class="container">
      <h1>📷 フォトフレーム撮影</h1>
      <div class="steps">
        <p>① イベントを選ぶ</p>
        <p>② デザインを選ぶ</p>
        <p>③ 撮影して保存する</p>
      </div>
      <button id="btn-start" class="btn-primary">撮影をはじめる</button>
      <p class="notice">撮影した写真はこの端末にのみ保存されます。<br>Webサイト側には保存されません。</p>
    </div>
  </div>

  <!-- イベント選択画面 -->
  <div id="screen-event" class="screen">
    <div class="container">
      <h2>イベントを選んでください</h2>
      <div id="event-list" class="event-list"></div>
    </div>
  </div>

  <!-- デザイン選択画面 -->
  <div id="screen-design" class="screen">
    <div class="container">
      <div class="screen-header">
        <button id="btn-back-event" class="btn-back">← もどる</button>
        <h2 id="design-event-title">デザインを選んでください</h2>
      </div>
      <div id="design-list" class="frame-list"></div>
      <button id="btn-to-camera" class="btn-primary" disabled>このデザインで撮影する</button>
    </div>
  </div>

  <!-- 撮影画面 -->
  <div id="screen-camera" class="screen">
    <div class="camera-wrapper">
      <div id="camera-container" class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <img id="frame-overlay" class="frame-overlay" src="" alt="">
        <div id="countdown" class="countdown"></div>
      </div>
      <div class="zoom-controls">
        <button id="btn-zoom-in" class="btn-zoom">＋</button>
        <span id="zoom-label" class="zoom-label">1.0倍</span>
        <button id="btn-zoom-out" class="btn-zoom">−</button>
      </div>
    </div>
    <div class="camera-controls">
      <button id="btn-switch-camera" class="btn-icon" title="カメラ切替">🔄</button>
      <div class="capture-stack">
        <button id="btn-capture" class="btn-capture">撮影</button>
        <button id="btn-timer" class="btn-timer">⏱ 5秒タイマー</button>
        <p class="timer-hint">5秒後に3枚連続撮影します</p>
      </div>
      <button id="btn-toggle-orientation" class="btn-icon" title="縦横切替">縦横</button>
      <button id="btn-change-frame" class="btn-icon" title="デザイン変更">🖼️</button>
    </div>
  </div>

  <!-- 保存画面 -->
  <div id="screen-save" class="screen">
    <div class="container">
      <h2>撮影結果</h2>
      <div class="preview-wrapper">
        <canvas id="canvas-result" style="display:none;"></canvas>
        <img id="img-result" class="img-result" src="" alt="撮影結果">
        <div id="burst-thumbs" class="burst-thumbs"></div>
        <p class="burst-hint">気に入った1枚をタップしてください</p>
      </div>
      <a id="btn-save" class="btn-primary" download="photo-frame.png">保存する</a>
      <button id="btn-retake" class="btn-secondary">撮り直す</button>
      <button id="btn-new-frame" class="btn-secondary">デザインを変えて撮る</button>
      <p class="notice">「保存する」ボタンをタップして保存してください。<br>保存先はダウンロードフォルダです。</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
